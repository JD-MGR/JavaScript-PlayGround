<script>
const calculation=document.getElementById("calculation");
let expression = "";
document.querySelectorAll(".btn").forEach(button=>{
	if (button.id === "symbol") return;
	button.addEventListener("click",()=>{
		const value = button.textContent;
		 expression += value;
		calculation.textContent=expression;
	});
});

const plusMinusButton = document.getElementById("symbol");
plusMinusButton.addEventListener("click", toggleSign);
function tokenizeExpression(expr) {
    const tokens = [];
    let i = 0;

    while (i < expr.length) {
        const ch = expr[i];
        if (ch === ' ') {
            i++;
            continue;
        }

        if (ch === '+' || ch === 'x' || ch === '/' || ch === '%' || ch === '(' || ch === ')') {
            tokens.push(ch);
            i++;
            continue;
        }

        if (ch === '-') {
            const prev = tokens.length === 0 ? null : tokens[tokens.length - 1];
            if (prev === null || ['+', '-', 'x', '/', '%', '('].includes(prev)) {
                let num = '-';
                let dotCount = 0;
                i++;
                while (i < expr.length && ((expr[i] >= '0' && expr[i] <= '9') || expr[i] === '.')) {
                    if (expr[i] === '.') {
                        dotCount++;
                        if (dotCount > 1) break;
                    }
                    num += expr[i];
                    i++;
                }
                if (num === '-' || num === '-.') {
                    return null;
                }
                tokens.push(num);
                continue;
            }
            tokens.push(ch);
            i++;
            continue;
        }

        if ((ch >= '0' && ch <= '9') || ch === '.') {
            let num = '';
            let dotCount = 0;
            while (i < expr.length && ((expr[i] >= '0' && expr[i] <= '9') || expr[i] === '.')) {
                if (expr[i] === '.') {
                    dotCount++;
                    if (dotCount > 1) break;
                }
                num += expr[i];
                i++;
            }
            tokens.push(num);
            continue;
        }

        return null;
    }

    return tokens;
}

function isOperator(token) {
    return token === '+' || token === '-' || token === 'x' || token === '/' || token === '%';
}

function precedence(op) {
    return op === 'x' || op === '/' || op === '%' ? 2 : 1;
}

function infixToRPN(tokens) {
    const output = [];
    const stack = [];

    for (const token of tokens) {
        if (isOperator(token)) {
            while (
                stack.length &&
                isOperator(stack[stack.length - 1]) &&
                precedence(stack[stack.length - 1]) >= precedence(token)
            ) {
                output.push(stack.pop());
            }
            stack.push(token);
        } else if (token === '(') {
            stack.push(token);
        } else if (token === ')') {
            while (stack.length && stack[stack.length - 1] !== '(') {
                output.push(stack.pop());
            }
            if (!stack.length) {
                return null;
            }
            stack.pop();
        } else {
            output.push(token);
        }
    }

    while (stack.length) {
        const top = stack.pop();
        if (top === '(' || top === ')') {
            return null;
        }
        output.push(top);
    }

    return output;
}

function evaluateRPN(rpn) {
    const stack = [];
    for (const token of rpn) {
        if (isOperator(token)) {
            if (stack.length < 2) return NaN;
            const b = stack.pop();
            const a = stack.pop();
            stack.push(evaluate(a, b, token));
        } else {
            const value = parseFloat(token);
            if (isNaN(value)) return NaN;
            stack.push(value);
        }
    }
    return stack.length === 1 ? stack[0] : NaN;
}
function operate(){
    if(expression==='143'){
        document.getElementById("result").textContent = "I Love You";
        return;
     }
     localStorage.setItem("expression",expression);
    const tokens = tokenizeExpression(expression);
    if (!tokens) {
        document.getElementById("result").textContent = "Invalid Expression";
        return;
    }

    const rpn = infixToRPN(tokens);
    if (!rpn) {
        document.getElementById("result").textContent = "Invalid Expression";
        return;
    }

    const result = evaluateRPN(rpn);
    if (isNaN(result)) {
        document.getElementById("result").textContent = "Invalid Numbers";
        return;
    }
    if(result===143){
        document.getElementById("result").textContent = "I Love You";
        return;
     }
    document.getElementById("result").textContent = result;
    expression = result.toString();
    localStorage.setItem("result",result);
}
function evaluate(exp1,exp2,symbol){
switch(symbol){
case '+':
	return exp1+exp2;

case '-':
	return exp1-exp2;
	
case 'x':
	return exp1*exp2;
	
case '/':
	return exp1/exp2;
case '%':
	return exp1%exp2;
}
}
let checkValidation=0;
	function toggleSign() {
    if (!expression) return;

    const match = expression.match(/-?\d*\.?\d+$/);
    if (!match) return;

    const number = match[0];
    const startIndex = match.index;//returns the index where we have the second expression

    let toggled;
    if (number.startsWith("-")) {
        toggled = '+'+number.slice(1);   // remove minus because it returns the string after the 0 
    } else if(number.startsWith("+")||number.startsWith("")){   // if the number starts with plus or if the number is in the form of (-number  )
         toggled = '-'+number.slice(1);   // remove plus{
        toggled = "("+"-" + number+")";      // add minus
    }
	else{
		toggled=number;
	}
    expression =
        expression.slice(0, startIndex) + toggled; 

    calculation.textContent = expression;
}


function backspace(){
	expression=expression.substring(0,expression.length-1);
	const calculation=document.getElementById("calculation");
	calculation.textContent=expression;
}
function allClear(){
	const result=document.getElementById("result");
	result.textContent=0;
	const calculation=document.getElementById("calculation");
	calculation.textContent="";
	expression="";
}
const allClearButton=document.getElementById("allclear");
allClearButton.addEventListener("dblclick",allClearHistory);
function allClearHistory(){
	const result=document.getElementById("result");
	result.textContent=0;
	const calculation=document.getElementById("calculation");
	calculation.textContent="";
	expression="";
    localStorage.clear();
}
function retreive(){
    const history=localStorage.getItem("result");
    const historycalculation=localStorage.getItem("expression");
    if(history){
        document.getElementById("result").textContent=history;
        document.getElementById("calculation").textContent=historycalculation;
        expression=historycalculation;
        // expression=history;
        // result.textContent=expression;
        // let expression2=historycalculation;
        // calculation.textContent=expression2;
    }
    else{
        document.getElementById("result").textContent="No History Found";
}
}
